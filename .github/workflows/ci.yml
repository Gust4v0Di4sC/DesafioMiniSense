name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Lint, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: End-to-end tests
        run: npm run test:e2e
